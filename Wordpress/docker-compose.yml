version: "3.9"

# ============================================================
# WordPress LMS Stack – LearnPress + lp-stats-addon
# Tác giả: Cần Đức Điệp | Thực hành 30/03/2026
# ============================================================
# Cách chạy:
#   docker-compose up -d
#   Truy cập: http://localhost:8080
#   phpMyAdmin:  http://localhost:8081
#   Admin WP:    http://localhost:8080/wp-admin
#   User: admin | Pass: admin123
# ============================================================

services:

  # ----------------------------------------------------------
  # MySQL 8.0 – Database
  # ----------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: lms_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE:      wordpress_lms
      MYSQL_USER:          wp_user
      MYSQL_PASSWORD:      wp_pass123
    volumes:
      - db_data:/var/lib/mysql
      # Import dữ liệu mẫu khi khởi tạo lần đầu
      - ./sql/01_wordpress_base.sql:/docker-entrypoint-initdb.d/01_wordpress_base.sql
      - ./sql/02_learnpress_schema.sql:/docker-entrypoint-initdb.d/02_learnpress_schema.sql
      - ./sql/03_sample_data.sql:/docker-entrypoint-initdb.d/03_sample_data.sql
    networks:
      - lms_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "wp_user", "-pwp_pass123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # WordPress – Web App
  # ----------------------------------------------------------
  wordpress:
    image: wordpress:6.5-php8.2-apache
    container_name: lms_wordpress
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST:     db:3306
      WORDPRESS_DB_NAME:     wordpress_lms
      WORDPRESS_DB_USER:     wp_user
      WORDPRESS_DB_PASSWORD: wp_pass123
      WORDPRESS_TABLE_PREFIX: wp_
      # Cấu hình debug (tắt khi production)
      WORDPRESS_DEBUG:       "true"
      WORDPRESS_DEBUG_LOG:   "true"
    volumes:
      # Mount plugin tùy chỉnh
      - ./plugin/lp-stats-addon:/var/www/html/wp-content/plugins/lp-stats-addon
      # Mount theme child (tùy chọn)
      - ./theme-child:/var/www/html/wp-content/themes/lms-child
      # Mount script cài đặt tự động
      - ./scripts:/var/www/html/scripts
      # Lưu trữ uploads
      - wp_uploads:/var/www/html/wp-content/uploads
      # Config WordPress
      - ./docker/wp-config-extra.php:/var/www/html/wp-config-extra.php
    networks:
      - lms_net

  # ----------------------------------------------------------
  # phpMyAdmin – Quản lý DB qua giao diện web
  # ----------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: lms_phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST:     db
      PMA_PORT:     3306
      PMA_USER:     wp_user
      PMA_PASSWORD: wp_pass123
    networks:
      - lms_net

  # ----------------------------------------------------------
  # WP-CLI – Công cụ cài đặt WP từ command line
  # Chạy một lần để setup: docker-compose run --rm wp-setup
  # ----------------------------------------------------------
  wp-setup:
    image: wordpress:cli-php8.2
    container_name: lms_wpcli
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./plugin/lp-stats-addon:/var/www/html/wp-content/plugins/lp-stats-addon
      - ./scripts:/scripts
      - wp_uploads:/var/www/html/wp-content/uploads
    environment:
      WORDPRESS_DB_HOST:     db:3306
      WORDPRESS_DB_NAME:     wordpress_lms
      WORDPRESS_DB_USER:     wp_user
      WORDPRESS_DB_PASSWORD: wp_pass123
    user: "33:33"
    entrypoint: /scripts/setup.sh
    networks:
      - lms_net

# ----------------------------------------------------------
# Volumes & Networks
# ----------------------------------------------------------
volumes:
  db_data:
  wp_uploads:

networks:
  lms_net:
    driver: bridge
